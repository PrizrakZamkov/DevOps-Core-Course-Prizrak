---
# Common system setup tasks

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: common

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
  tags: common

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"
  tags: common
