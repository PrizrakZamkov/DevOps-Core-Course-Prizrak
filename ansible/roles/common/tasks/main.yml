---
# Common system setup tasks with blocks and tags

- name: Package management
  block:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present

  rescue:
    - name: Fix broken apt cache
      ansible.builtin.command: apt-get update --fix-missing
      changed_when: true

    - name: Retry package installation
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present

  always:
    - name: Log package installation completion
      ansible.builtin.copy:
        content: "Package installation completed at {{ ansible_date_time.iso8601 }}"
        dest: /tmp/common_packages.log
        mode: '0644'

  become: yes
  tags:
    - common
    - packages

- name: System configuration
  block:
    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone }}"

  always:
    - name: Log system configuration completion
      ansible.builtin.copy:
        content: "System configured at {{ ansible_date_time.iso8601 }}"
        dest: /tmp/common_system.log
        mode: '0644'

  become: yes
  tags:
    - common
    - system