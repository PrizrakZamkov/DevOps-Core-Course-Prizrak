---
# Docker installation and configuration with blocks

- name: Docker installation
  block:
    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: yes
        
    - name: Install Docker Compose v2 plugin
      ansible.builtin.apt:
        name: docker-compose-plugin
        state: present
        update_cache: yes

  rescue:
    - name: Wait and retry on network failure
      ansible.builtin.pause:
        seconds: 10

    - name: Retry Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Retry Docker installation
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: yes

  always:
    - name: Ensure Docker service is enabled
      ansible.builtin.service:
        name: docker
        enabled: yes

  become: yes
  tags:
    - docker
    - docker_install

- name: Docker configuration
  block:
    - name: Add users to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop: "{{ docker_users }}"

    - name: Configure Docker daemon
      ansible.builtin.copy:
        content: "{{ docker_daemon_options | to_nice_json }}"
        dest: /etc/docker/daemon.json
        mode: '0644'
      notify: Restart docker

    - name: Install Docker Python library
      ansible.builtin.pip:
        name: docker
        state: present
        executable: pip3
        break_system_packages: yes

  always:
    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started

  become: yes
  tags:
    - docker
    - docker_config