---
# ArgoCD Deployment Playbook
# Lab 13: GitOps with ArgoCD
# Installs ArgoCD and deploys applications using declarative Git-based configuration

- name: Deploy ArgoCD and Applications
  hosts: localhost
  connection: local
  gather_facts: yes
  vars:
    argocd_namespace: argocd
    argocd_helm_repo: https://argoproj.github.io/argo-helm
    argocd_helm_chart: argo/argo-cd
    target_kubeconfig: "{{ lookup('env','KUBECONFIG') | default('~/.kube/config') }}"

  pre_tasks:
    - name: Check kubectl availability
      command: kubectl version --client --short
      register: kubectl_version
      changed_when: false

    - name: Display kubectl version
      debug:
        msg: "{{ kubectl_version.stdout }}"

    - name: Check current Kubernetes context
      command: kubectl config current-context
      register: kube_context
      changed_when: false

    - name: Display cluster info
      debug:
        msg: |
          Kubernetes Context: {{ kube_context.stdout }}
          Target Kubeconfig: {{ target_kubeconfig }}

  tasks:
    # Helm Repository Setup
    - name: Add ArgoCD Helm repository
      kubernetes.core.helm_repository:
        name: argo
        repo_url: "{{ argocd_helm_repo }}"
        state: present

    - name: Update Helm repositories
      command: helm repo update argo
      register: helm_update
      changed_when: '"Successfully got an update" in helm_update.stdout or "updated" in helm_update.stdout.lower()'

    # Namespace Creation
    - name: Create ArgoCD namespace
      kubernetes.core.k8s:
        name: "{{ argocd_namespace }}"
        api_version: v1
        kind: Namespace
        state: present

    - name: Create dev namespace
      kubernetes.core.k8s:
        name: dev
        api_version: v1
        kind: Namespace
        state: present

    - name: Create prod namespace
      kubernetes.core.k8s:
        name: prod
        api_version: v1
        kind: Namespace
        state: present

    # ArgoCD Installation
    - name: Install ArgoCD using Helm
      kubernetes.core.helm:
        name: argocd
        chart_ref: "{{ argocd_helm_chart }}"
        release_namespace: "{{ argocd_namespace }}"
        create_namespace: true
        values:
          server:
            insecure: true
            service:
              type: LoadBalancer
              port: 443
          controller:
            replicas: 1
          repoServer:
            replicas: 1
          applicationSet:
            replicas: 1
          redis:
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi
        wait: true
        wait_condition:
          type: Deployed
          status: "True"
        timeout: 5m

    # Wait for ArgoCD pods to be ready
    - name: Wait for ArgoCD server pod to be ready
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ argocd_namespace }}"
        label_selectors:
          - app.kubernetes.io/name=argocd-server
        field_selectors:
          - status.phase=Running
      register: argocd_server_pod
      until: argocd_server_pod.resources | length > 0
      retries: 30
      delay: 10

    - name: Wait for all ArgoCD pods to be ready
      command: >
        kubectl wait --for=condition=ready pod
        -l app.kubernetes.io/name=argocd-server
        -n {{ argocd_namespace }}
        --timeout=300s
      register: wait_result
      changed_when: false

    - name: Display ArgoCD pod status
      command: kubectl get pods -n {{ argocd_namespace }}
      register: argocd_pods
      changed_when: false

    - name: Show ArgoCD pods
      debug:
        msg: "{{ argocd_pods.stdout_lines }}"

    # Get ArgoCD Initial Password
    - name: Retrieve ArgoCD initial admin password
      kubernetes.core.k8s_info:
        kind: Secret
        name: argocd-initial-admin-secret
        namespace: "{{ argocd_namespace }}"
      register: argocd_secret
      retries: 10
      delay: 5
      until: argocd_secret.resources | length > 0

    - name: Extract and decode password
      set_fact:
        argocd_initial_password: "{{ argocd_secret.resources[0].data.password | b64decode }}"
      when: argocd_secret.resources | length > 0

    - name: Display ArgoCD credentials
      debug:
        msg: |
          ArgoCD Initial Admin Password: {{ argocd_initial_password }}
          Username: admin
          Note: Save this password for UI access

    # Port Forwarding Setup (background task)
    - name: Set up port forwarding for ArgoCD UI
      shell: |
        # Kill any existing port-forward processes on port 8080
        lsof -ti :8080 | xargs kill -9 2>/dev/null || true
        sleep 1
        
        # Start new port-forward in background
        kubectl port-forward svc/argocd-server -n {{ argocd_namespace }} 8080:443 > /tmp/argocd-portforward.log 2>&1 &
        sleep 3
        echo "Port forwarding started"
      register: portforward_result
      changed_when: "'started' in portforward_result.stdout"
      async: 60
      poll: 0

    - name: Wait for ArgoCD UI to be accessible
      uri:
        url: "http://localhost:8080"
        method: GET
        validate_certs: false
        status_code: 200,302,301
      register: argocd_ui
      retries: 10
      delay: 5
      until: argocd_ui.status in [200, 301, 302]
      failed_when: false

    # Deploy Namespaces and Applications
    - name: Apply namespace manifests
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('file', playbook_dir + '/../../k8s/argocd/namespace.yaml') }}"

    - name: Deploy dev application
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('file', playbook_dir + '/../../k8s/argocd/application-dev.yaml') }}"
      register: app_dev_deploy

    - name: Deploy prod application
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('file', playbook_dir + '/../../k8s/argocd/application-prod.yaml') }}"
      register: app_prod_deploy

    - name: Deploy applicationset (bonus)
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('file', playbook_dir + '/../../k8s/argocd/applicationset.yaml') }}"
      register: appset_deploy

    # Verify Application Status
    - name: Wait for applications to be created
      kubernetes.core.k8s_info:
        kind: Application
        namespace: "{{ argocd_namespace }}"
        name: "{{ item }}"
      register: app_status
      until: app_status.resources | length > 0
      retries: 10
      delay: 5
      loop:
        - python-app-dev
        - python-app-prod

    - name: Display application resources
      command: kubectl get applications -n {{ argocd_namespace }}
      register: app_list
      changed_when: false

    - name: Show deployed applications
      debug:
        msg: "{{ app_list.stdout_lines }}"

  post_tasks:
    - name: Display ArgoCD UI access information
      debug:
        msg: |
          ============================================
          ArgoCD Setup Complete!
          ============================================
          
          UI Access:
            URL: https://localhost:8080 or http://localhost:8080
            Username: admin
            Password: {{ argocd_initial_password }}
          
          Port Forwarding:
            kubectl port-forward svc/argocd-server -n {{ argocd_namespace }} 8080:443
          
          CLI Commands:
            argocd login localhost:8080 --insecure
            argocd app list
            argocd app get python-app-dev
            argocd app get python-app-prod
          
          Verify Deployments:
            kubectl get pods -n dev
            kubectl get pods -n prod
            kubectl get pods -n {{ argocd_namespace }}
          
          ============================================
