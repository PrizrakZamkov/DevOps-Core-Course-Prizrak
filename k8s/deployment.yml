apiVersion: apps/v1
kind: Deployment
metadata:
  name: system-info-api
  labels:
    app: system-info-api
    version: v2 
spec:
  replicas: 5
  selector:
    matchLabels:
      app: system-info-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: system-info-api
    spec:
      containers:
      - name: system-info-api
        image: prizrakzamkov/system-info-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 6000
          name: http
        env:
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "6000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 6000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 6000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3