{{- if .Values.statefulset.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "system-info-api.fullname" . }}
  labels:
    {{- include "system-info-api.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "system-info-api.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: {{ .Values.statefulset.podManagementPolicy }}
  updateStrategy:
    type: {{ .Values.statefulset.updateStrategy.type }}
    {{- if and (eq .Values.statefulset.updateStrategy.type "RollingUpdate") .Values.statefulset.updateStrategy.partitioned }}
    rollingUpdate:
      partition: {{ .Values.statefulset.updateStrategy.partition }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "system-info-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "system-info-api.selectorLabels" . | nindent 8 }}
      {{- if .Values.vault.enabled }}
      annotations:
        {{- include "system-info-api.vaultAnnotations" . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "system-info-api.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "system-info-api.fullname" . }}-config
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            {{- toYaml .Values.env | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "system-info-api.fullname" . }}-env
          {{- if .Values.secret.enabled }}
            - secretRef:
                name: {{ include "system-info-api.secretName" . }}
          {{- end }}
          volumeMounts:
            - name: config-volume
              mountPath: /config
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data-volume
              mountPath: /data
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data-volume
        labels:
          {{- include "system-info-api.labels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode | quote }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
  {{- end }}
{{- end }}
