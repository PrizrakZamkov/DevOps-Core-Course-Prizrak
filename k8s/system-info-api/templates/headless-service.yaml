{{- if .Values.statefulset.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "system-info-api.fullname" . }}-headless
  labels:
    {{- include "system-info-api.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: {{ .Values.statefulset.headlessService.publishNotReadyAddresses }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "system-info-api.selectorLabels" . | nindent 4 }}
{{- end }}
