{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "system-info-api.fullname" . }}
  labels:
    {{- include "system-info-api.labels" . | nindent 4 }}
    {{ .Values.serviceMonitor.releaseLabel }}: {{ .Values.serviceMonitor.releaseName | quote }}
spec:
  selector:
    matchLabels:
      {{- include "system-info-api.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: http
      path: {{ .Values.serviceMonitor.path }}
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
{{- end }}
