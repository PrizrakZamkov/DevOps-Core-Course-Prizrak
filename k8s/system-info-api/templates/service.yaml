apiVersion: v1
kind: Service
metadata:
  name: {{ include "system-info-api.fullname" . }}
  labels:
    {{- include "system-info-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
      {{- if (and (eq .Values.service.type "NodePort") .Values.service.nodePort) }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    {{- include "system-info-api.selectorLabels" . | nindent 4 }}