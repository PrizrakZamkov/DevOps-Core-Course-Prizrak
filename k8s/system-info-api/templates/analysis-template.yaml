{{- if and .Values.rollout.enabled .Values.rollout.analysis.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ include "system-info-api.fullname" . }}-success-rate
  labels:
    {{- include "system-info-api.labels" . | nindent 4 }}
spec:
  metrics:
    - name: health-check
      interval: {{ .Values.rollout.analysis.interval }}
      count: {{ .Values.rollout.analysis.count }}
      failureLimit: {{ .Values.rollout.analysis.failureLimit }}
      provider:
        web:
          url: http://{{ include "system-info-api.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local{{ .Values.rollout.analysis.healthPath }}
          jsonPath: "{$.status}"
      successCondition: result == "{{ .Values.rollout.analysis.expectedStatus }}"
{{- end }}
