{{- if .Values.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "system-info-api.fullname" . }}
  labels:
    {{- include "system-info-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "system-info-api.selectorLabels" . | nindent 6 }}
  strategy:
    {{- if eq .Values.rollout.strategy "blueGreen" }}
    blueGreen:
      activeService: {{ include "system-info-api.fullname" . }}
      previewService: {{ include "system-info-api.fullname" . }}-preview
      autoPromotionEnabled: {{ .Values.rollout.blueGreen.autoPromotionEnabled }}
      {{- with .Values.rollout.blueGreen.autoPromotionSeconds }}
      autoPromotionSeconds: {{ . }}
      {{- end }}
      {{- with .Values.rollout.blueGreen.scaleDownDelaySeconds }}
      scaleDownDelaySeconds: {{ . }}
      {{- end }}
    {{- else }}
    canary:
      {{- if .Values.rollout.analysis.enabled }}
      analysis:
        templates:
          - templateName: {{ include "system-info-api.fullname" . }}-success-rate
      {{- end }}
      steps:
        {{- toYaml .Values.rollout.canary.steps | nindent 8 }}
    {{- end }}
  template:
    metadata:
      labels:
        {{- include "system-info-api.selectorLabels" . | nindent 8 }}
      {{- if .Values.vault.enabled }}
      annotations:
        {{- include "system-info-api.vaultAnnotations" . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "system-info-api.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "system-info-api.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: data-volume
          persistentVolumeClaim:
            claimName: {{ include "system-info-api.fullname" . }}-data
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            {{- toYaml .Values.env | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "system-info-api.fullname" . }}-env
          {{- if .Values.secret.enabled }}
            - secretRef:
                name: {{ include "system-info-api.secretName" . }}
          {{- end }}
          volumeMounts:
            - name: config-volume
              mountPath: /config
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data-volume
              mountPath: /data
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
