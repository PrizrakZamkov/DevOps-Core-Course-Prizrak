# Lab 14: Canary rollout values

replicaCount: 5

image:
  repository: prizrakzamkov/system-info-api
  tag: "2.0.0"
  pullPolicy: IfNotPresent

environment: production
logLevel: INFO

features:
  metrics: true
  visits: true

service:
  type: ClusterIP
  port: 80
  targetPort: 6000

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

persistence:
  enabled: true
  size: 200Mi

rollout:
  enabled: true
  strategy: canary
  canary:
    steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 40
      - pause:
          duration: 30s
      - setWeight: 60
      - pause:
          duration: 30s
      - setWeight: 80
      - pause:
          duration: 30s
      - setWeight: 100
  analysis:
    enabled: true
    interval: 10s
    count: 3
    failureLimit: 1
    healthPath: /health
    expectedStatus: healthy
