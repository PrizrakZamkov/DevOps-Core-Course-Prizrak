# Lab 16: monitoring, ServiceMonitor, and init containers

replicaCount: 2

image:
  repository: prizrakzamkov/system-info-api
  tag: "2.0.0"
  pullPolicy: IfNotPresent

environment: monitoring
logLevel: INFO

features:
  metrics: true
  visits: true

service:
  type: ClusterIP
  port: 80
  targetPort: 6000

resources:
  limits:
    cpu: 300m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

persistence:
  enabled: true
  size: 100Mi
  storageClass: ""

initContainers:
  download:
    enabled: true
    image: busybox:1.36
    url: https://example.com
    fileName: index.html
    mountPath: /init-data
  waitForService:
    enabled: true
    image: busybox:1.36
    serviceName: kubernetes.default.svc.cluster.local
    intervalSeconds: 2

serviceMonitor:
  enabled: true
  releaseLabel: release
  releaseName: monitoring
  path: /metrics
  interval: 15s
  scrapeTimeout: 10s

rollout:
  enabled: false
