# Production environment

replicaCount: 5

image:
  tag: "2.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP 

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 5

environment: production
logLevel: INFO

features:
  metrics: true
  visits: true

persistence:
  enabled: true
  size: 200Mi