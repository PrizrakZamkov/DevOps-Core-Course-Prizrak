# Lab 14: Blue-green rollout values

replicaCount: 5

image:
  repository: prizrakzamkov/system-info-api
  tag: "2.0.0"
  pullPolicy: IfNotPresent

environment: production
logLevel: INFO

features:
  metrics: true
  visits: true

service:
  type: ClusterIP
  port: 80
  targetPort: 6000

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

persistence:
  enabled: true
  size: 200Mi

rollout:
  enabled: true
  strategy: blueGreen
  blueGreen:
    autoPromotionEnabled: false
    scaleDownDelaySeconds: 30
    previewService:
      type: ClusterIP
  analysis:
    enabled: false
