# Default values for system-info-api

replicaCount: 3

image:
  repository: prizrakzamkov/system-info-api
  pullPolicy: Always
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

service:
  type: NodePort
  port: 80
  targetPort: 6000
  nodePort: 30080

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: 6000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 6000
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

env:
  - name: HOST
    value: "0.0.0.0"
  - name: PORT
    value: "6000"

secret:
  enabled: true
  create: true
  name: ""
  type: Opaque
  data:
    username: "change-me"
    password: "change-me"

vault:
  enabled: false
  role: "system-info-api"
  authPath: "auth/kubernetes"
  secretPath: "secret/data/system-info-api/config"
  fileName: "config"
  command: ""
  template: |
    {{- with secret "secret/data/system-info-api/config" -}}
    APP_USERNAME={{ .Data.data.username }}
    APP_PASSWORD={{ .Data.data.password }}
    {{- end }}
  extraAnnotations: {}

nodeSelector: {}
tolerations: []
affinity: {}

# Environment configuration
environment: production
logLevel: INFO

features:
  metrics: true
  visits: true

  # Persistent storage
persistence:
  enabled: true
  size: 100Mi
  storageClass: ""  # Use default (minikube: standard)

initContainers:
  download:
    enabled: false
    image: busybox:1.36
    url: https://example.com
    fileName: index.html
    mountPath: /init-data
  waitForService:
    enabled: false
    image: busybox:1.36
    serviceName: kubernetes.default.svc.cluster.local
    intervalSeconds: 2

serviceMonitor:
  enabled: false
  releaseLabel: release
  releaseName: monitoring
  path: /metrics
  interval: 15s
  scrapeTimeout: 10s

rollout:
  enabled: false
  strategy: canary
  canary:
    steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 40
      - pause:
          duration: 30s
      - setWeight: 60
      - pause:
          duration: 30s
      - setWeight: 80
      - pause:
          duration: 30s
      - setWeight: 100
  blueGreen:
    autoPromotionEnabled: false
    autoPromotionSeconds: null
    scaleDownDelaySeconds: 30
    previewService:
      type: ClusterIP
      nodePort: null
  analysis:
    enabled: false
    interval: 10s
    count: 3
    failureLimit: 1
    healthPath: /health
    expectedStatus: healthy
